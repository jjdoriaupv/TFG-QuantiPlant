<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configuración</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Configuración de Captura Automática</h1>

    <form method="POST">
      <label>
        <input type="checkbox" name="enabled" {% if config.enabled %}checked{% endif %}>
        Activar captura automática
      </label>
      <br><br>
      <label>
        Intervalo entre fotos (segundos):
        <input type="number" name="interval" min="1" value="{{ config.interval }}">
      </label>
      <br><br>
      <button class="button" type="submit">Guardar configuración</button>
    </form>

    <br><a href="/" class="button">← Volver al inicio</a>
  </div>
</body>
</html>
